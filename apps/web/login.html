<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="loginTitle">تسجيل الدخول - SVU Community</title>
    <meta name="description" content="تسجيل الدخول إلى SVU Community">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0f172a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Language & Theme Toggle -->
    <div class="fixed top-4 right-4 z-50 toggle-bar">
        <button data-lang-toggle onclick="window.i18n?.toggleLang(); location.reload();"
            class="lang-toggle-btn" aria-label="Toggle language">
            <span class="lang-icon">
                <svg class="lang-globe" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                </svg>
                EN
            </span>
        </button>
        <div class="toggle-divider"></div>
        <button id="themeToggleBtn" onclick="window.toggleTheme?.()"
            class="theme-toggle-btn" aria-label="Toggle theme">
            <span class="icon-wrapper">
                <svg class="icon-sun hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <svg class="icon-moon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
                <svg class="icon-system hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
            </span>
        </button>
    </div>

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-primary-400 to-primary-600 flex items-center justify-center shadow-xl shadow-primary-500/30">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold gradient-text">SVU Community</h1>
        </div>

        <!-- Login Form -->
        <div class="glass rounded-2xl p-8 shadow-2xl">
            <h2 class="text-xl font-bold text-white mb-6 text-center" data-i18n="loginTitle">تسجيل الدخول</h2>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-secondary-300 text-sm mb-2" data-i18n="loginEmail">البريد الإلكتروني أو اسم المستخدم</label>
                    <input type="text" id="loginIdentifier" required autocomplete="username"
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-secondary-500 outline-none"
                        placeholder="name_123456 أو email@example.com">
                </div>

                <div>
                    <label class="block text-secondary-300 text-sm mb-2" data-i18n="loginPassword">كلمة المرور</label>
                    <div class="relative">
                        <input type="password" id="loginPassword" required autocomplete="current-password"
                            class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-secondary-500 outline-none pl-12"
                            data-i18n-placeholder="loginPassword">
                        <button type="button" onclick="togglePassword('login')"
                            class="absolute left-3 top-1/2 -translate-y-1/2 text-secondary-400 hover:text-white transition">
                            <svg id="toggleLoginPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-secondary-600 bg-secondary-800 text-primary-500 focus:ring-primary-500 focus:ring-offset-0">
                        <span class="text-secondary-400 text-sm mr-2" data-i18n="loginRemember">تذكرني</span>
                    </label>
                    <button type="button" onclick="showForgotPassword()" class="text-primary-400 hover:text-primary-300 text-sm transition" data-i18n="loginForgot">
                        نسيت كلمة المرور؟
                    </button>
                </div>

                <button type="submit" id="loginBtn"
                    class="w-full py-3 bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-500 hover:to-primary-400 text-white font-semibold rounded-xl transition-all duration-300 shadow-lg shadow-primary-500/30 hover:shadow-primary-500/50">
                    <span data-i18n="loginBtn">تسجيل الدخول</span>
                </button>
            </form>

            <div class="mt-6 text-center">
                <span class="text-secondary-400 text-sm" data-i18n="loginNoAccount">ليس لديك حساب؟ </span>
                <a href="register.html" class="text-primary-400 hover:text-primary-300 text-sm font-semibold transition" data-i18n="loginCreateAccount">
                    إنشاء حساب جديد
                </a>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="index.html" class="text-secondary-400 hover:text-white text-sm transition flex items-center justify-center gap-2">
                <svg class="w-4 h-4 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                <span data-i18n="backToHome">العودة للرئيسية</span>
            </a>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="fixed inset-0 modal hidden items-center justify-center z-50 p-4" style="display:none;">
        <div class="glass rounded-2xl p-8 max-w-md w-full shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white" data-i18n="forgotPassword">استعادة كلمة المرور</h3>
                <button onclick="hideForgotPassword()" class="text-secondary-400 hover:text-white transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <p class="text-secondary-300 text-sm mb-6" data-i18n="forgotPasswordDesc">
                أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور.
            </p>

            <form id="forgotPasswordForm" class="space-y-5">
                <div>
                    <label class="block text-secondary-300 text-sm mb-2" data-i18n="registerEmail">البريد الإلكتروني</label>
                    <input type="email" id="resetEmail" required autocomplete="email"
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-secondary-500 outline-none"
                        placeholder="email@example.com">
                </div>

                <button type="submit" id="resetBtn"
                    class="w-full py-3 bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-500 hover:to-primary-400 text-white font-semibold rounded-xl transition-all duration-300 shadow-lg shadow-primary-500/30">
                    <span data-i18n="forgotPasswordBtn">إرسال رابط الاستعادة</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 transform transition-all duration-300 z-[9999] opacity-0 translate-y-4" style="min-width: 250px;">
        <div id="toastContent" class="text-white px-6 py-3 rounded-xl shadow-2xl border text-center font-medium"></div>
    </div>

    <script src="env.js"></script>
<script src="js/config.js"></script>
    <script src="js/core.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/page-login.js"></script>
</body>
</html>
